<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My PW - Online Learning Platform</title>

    <!-- Link to the Web App Manifest -->
    <link rel="manifest" href="../model/manifest.json">
    <meta name="theme-color" content="#3B82F6">

    <!-- Your other CSS and content -->
    <style>
        /* ... your existing styles ... */
        #installButton {
            display: none; /* Hidden by default */
            /* Your button styles */
        }
    </style>
</head>
<body>
    <!-- Your page content here -->

    <!-- Optional: A custom install button -->
    <button id="installButton" hidden>Install App</button>

    <script>
        // PWA Installation Logic
        let installPrompt = null;
        const installButton = document.getElementById('installButton');

        // 1. Listen for the beforeinstallprompt event
        window.addEventListener('beforeinstallprompt', (event) => {
            // Prevent the mini-infobar from appearing on mobile
            event.preventDefault();
            // Stash the event so it can be triggered later.
            installPrompt = event;
            // Optionally, show your custom install button
            if (installButton) {
                installButton.hidden = false;
            }
            // Optional: Send analytics event that PWA install promo was shown.
            console.log(`'beforeinstallprompt' event was fired.`);
        });

        // 2. Trigger the install prompt when the user clicks the custom button
        if (installButton) {
            installButton.addEventListener('click', async () => {
                if (!installPrompt) {
                    return;
                }
                // Show the install prompt
                const result = await installPrompt.prompt();
                console.log(`Install prompt was: ${result.outcome}`);
                // Reset the deferred prompt variable
                installPrompt = null;
                // Hide the button after the prompt is shown
                installButton.hidden = true;
            });
        }

        // 3. (Optional) Detect successful installation
        window.addEventListener('appinstalled', () => {
            console.log('PWA was installed');
            installPrompt = null;
            if (installButton) {
                installButton.hidden = true;
            }
        });

        // Register the Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../model/sw.js')
                .then(reg => console.log('Service Worker registered', reg))
                .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
