<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lectures - Project02</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .chapter-item:hover { background-color: #f8fafc; }
    .active-chapter {
      background-color: #e0f2fe;
      border-left: 4px solid #3b82f6;
      border-radius: 12px;
      font-weight: 600;
    }
    .lecture-card { transition: all 0.3s ease; }
    .lecture-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .sidebar {
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -280px;
        top: 0;
        bottom: 0;
        z-index: 100;
        width: 280px;
        box-shadow: 4px 0 15px rgba(0,0,0,0.15);
      }
      .sidebar.open {
        transform: translateX(280px);
      }
    }
    .modal-content {
      max-height: 85vh;
      overflow-y: auto;
    }
    .manage-btn {
      transition: all 0.2s ease;
    }
    .manage-btn:hover {
      background-color: #eff6ff;
      border-color: #3b82f6;
      color: #1e40af;
    }
    .manage-btn-active {
      background-color: #dbeafe;
      border-color: #3b82f6;
      color: #1e40af;
      font-weight: 600;
    }
  </style>
</head>
<body class="bg-gray-50">

<!-- Overlay -->
<div id="overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/50 z-50 md:hidden"></div>

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <div class="sidebar w-72 bg-white border-r border-gray-200 overflow-y-auto" id="sidebar">
    <div class="p-6">
      <a href="/subjects.html" class="flex items-center gap-2 text-xl font-semibold text-gray-800 hover:text-blue-600 mb-8">
        ← Subjects
      </a>
      <div class="px-6 py-4 text-xs font-medium text-gray-500">CHAPTERS</div>
      <div class="px-3 space-y-0.5" id="chapters-list"></div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="bg-white border-b px-4 md:px-8 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="md:hidden text-3xl text-gray-700">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="text-2xl font-semibold" id="subject-title">All Classes</h1>
      </div>
      <div class="flex items-center gap-4">
        <button id="manage-btn" onclick="showManageModal()"
                class="hidden flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-medium transition-colors">
          <i class="fa-solid fa-plus"></i> Manage
        </button>
        <button onclick="logout()"
                class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-2xl text-sm font-medium">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>

    <div class="bg-white border-b px-4 md:px-8 py-4 flex gap-4 items-center">
      <div class="relative flex-1">
        <input type="text" id="search-input" placeholder="Search lectures by title..."
               onkeyup="applyFilters()" class="w-full border border-gray-300 rounded-2xl px-5 py-3 pl-12 focus:outline-none focus:border-blue-500">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
      <select id="filter-select" onchange="applyFilters()" class="border border-gray-300 rounded-2xl px-5 py-3 focus:outline-none">
        <option value="all">All Lectures</option>
        <option value="completed">Completed</option>
        <option value="pending">Not Completed</option>
      </select>
    </div>

    <div class="flex-1 overflow-y-auto p-4 md:p-8" id="main-content"></div>
  </div>
</div>

<!-- Notes & More Pop-up -->
<div id="notes-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200]">
  <div class="bg-white rounded-3xl p-8 w-full max-w-sm mx-4">
    <h3 class="text-xl font-semibold mb-6 text-center">What do you want to open?</h3>
    <div class="space-y-3">
      <button onclick="openPdf()" class="w-full py-4 border-2 border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white rounded-2xl font-medium flex items-center justify-center gap-3 transition-all">📄 Class PDF (Notes)</button>
      <button onclick="openDpp()" class="w-full py-4 border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-600 hover:text-white rounded-2xl font-medium flex items-center justify-center gap-3 transition-all">📝 DPP</button>
    </div>
    <button onclick="hideNotesModal()" class="w-full mt-6 py-3 text-gray-500 hover:text-gray-700 font-medium">Cancel</button>
  </div>
</div>

<!-- Manage Modal -->
<div id="manage-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl p-8 w-full max-w-lg mx-4 modal-content">
    <h2 class="text-2xl font-semibold mb-6">Manage Content</h2>
    <div class="grid grid-cols-2 gap-4 mb-8">
      <button onclick="setManageMode(1)" id="btn1" class="manage-btn py-4 border-2 border-blue-600 text-blue-600 rounded-2xl font-medium manage-btn-active">Add Chapter</button>
      <button onclick="setManageMode(2)" id="btn2" class="manage-btn py-4 border border-gray-300 rounded-2xl font-medium">Add Lecture</button>
      <button onclick="setManageMode(3)" id="btn3" class="manage-btn py-4 border border-gray-300 rounded-2xl font-medium">Delete Chapter</button>
      <button onclick="setManageMode(4)" id="btn4" class="manage-btn py-4 border border-gray-300 rounded-2xl font-medium">Delete Lecture</button>
      <button onclick="setManageMode(5)" id="btn5" class="manage-btn py-4 border border-gray-300 rounded-2xl font-medium col-span-2">Update Lecture (Add Notes/DPP)</button>
    </div>

    <div id="form1"><input id="chapter-title" type="text" placeholder="New Chapter Title" class="w-full border border-gray-300 rounded-2xl px-5 py-4 text-lg"></div>

    <div id="form2" class="hidden space-y-4">
      <select id="lecture-chapter-select" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select>
      <input id="lecture-title" type="text" placeholder="Lecture Title" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <div class="grid grid-cols-2 gap-4">
        <input id="lecture-date" type="date" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
        <input id="lecture-duration" type="text" placeholder="Duration (e.g. 52m)" value="45m" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      </div>
      <input id="lecture-youtube" type="text" placeholder="YouTube Video ID" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <input id="lecture-image" type="text" placeholder="Instructor Image URL (optional)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <input id="lecture-pdf" type="text" placeholder="Class PDF Link (Google Drive)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <input id="lecture-dpp" type="text" placeholder="DPP Link (Google Drive)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
    </div>

    <div id="form3" class="hidden"><select id="delete-chapter-select" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select></div>

    <div id="form4" class="hidden">
      <select id="delete-lecture-chapter" onchange="updateDeleteLectureOptions()" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-4"></select>
      <select id="delete-lecture-select" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select>
    </div>

    <div id="form5" class="hidden space-y-4">
      <select id="update-lecture-chapter" onchange="populateUpdateLectureSelect()" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select>
      <select id="update-lecture-select" onchange="loadLectureForUpdate()" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select>
      <input id="update-title" type="text" placeholder="Lecture Title (optional)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <input id="update-youtube" type="text" placeholder="YouTube Video ID (optional)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <input id="update-image" type="text" placeholder="Instructor Image URL (optional)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <input id="update-pdf" type="text" placeholder="Class PDF Link (Google Drive)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <input id="update-dpp" type="text" placeholder="DPP Link (Google Drive)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
    </div>

    <div class="flex gap-4 mt-8">
      <button onclick="hideManageModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Cancel</button>
      <button onclick="executeManageAction()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-semibold">Confirm Action</button>
    </div>
  </div>
</div>

<!-- Admin Login Modal -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100]">
  <div class="bg-white rounded-3xl p-8 w-full max-w-sm mx-4">
    <h3 class="text-xl font-semibold mb-4">Admin Login</h3>
    <p class="text-gray-600 mb-6">Use your admin account</p>
    <input type="email" id="adminEmail" placeholder="Admin Email" value="" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-3">
    <input type="password" id="adminPass" placeholder="Password" value="" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-6">
    <div class="flex gap-3">
      <button onclick="hideLoginModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Cancel</button>
      <button onclick="adminLogin()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-semibold">Login as Admin</button>
    </div>
  </div>
</div>

<script>
// ============== CONFIGURATION ==============
const urlParams = new URLSearchParams(window.location.search);
const subjectId = urlParams.get('subjectId');
const subjectName = urlParams.get('subjectName') || 'All Classes';
document.getElementById('subject-title').textContent = subjectName;

let currentChapterId = null;
let manageMode = 1;
let isAdmin = false;
let allLectures = [];
let currentPdfLink = '';
let currentDppLink = '';

// ====================== AUTH ======================
async function checkAuth() {
  try {
    const res = await fetch('/api/me', { credentials: 'include' });
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.success && data.user.role === 'admin') {
      document.getElementById('manage-btn').classList.remove('hidden');
      isAdmin = true;
    }
  } catch (err) {
    window.location.href = '/login.html';
  }
}

async function logout() {
  if (!confirm("Are you sure you want to logout?")) return;
  await fetch('/api/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/login.html';
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('hidden');
}

// ============== LOAD DATA ==============
async function loadData() {
  if (!subjectId) {
    document.getElementById('main-content').innerHTML = `<p class="text-center text-red-500 py-20">No subject selected.</p>`;
    return;
  }
  try {
    const chaptersRes = await fetch(`/api/chapters?subjectId=${subjectId}`, { credentials: 'include' });
    const chapters = await chaptersRes.json();

    let lectures = [];
    if (currentChapterId) {
      const lecturesRes = await fetch(`/api/lectures?chapterId=${currentChapterId}`, { credentials: 'include' });
      lectures = await lecturesRes.json();
    } else if (chapters.length > 0) {
      currentChapterId = chapters[0]._id;
      const lecturesRes = await fetch(`/api/lectures?chapterId=${currentChapterId}`, { credentials: 'include' });
      lectures = await lecturesRes.json();
    }

    allLectures = lectures;
    renderSidebar(chapters);
    renderLectures(lectures);
  } catch (err) {
    console.error(err);
    document.getElementById('main-content').innerHTML = `<p class="text-center text-red-500 py-20">Failed to load data. Please login again.</p>`;
  }
}

function renderSidebar(chapters) {
  const container = document.getElementById('chapters-list');
  container.innerHTML = '';
  chapters.forEach(ch => {
    const active = ch._id === currentChapterId ? 'active-chapter' : 'chapter-item';
    const div = document.createElement('div');
    div.className = `${active} px-4 py-3 text-sm cursor-pointer hover:bg-gray-100 rounded-xl`;
    div.textContent = ch.title;
    div.onclick = () => {
      selectChapter(ch._id);
      if (window.innerWidth < 768) toggleSidebar();
    };
    container.appendChild(div);
  });
}

function renderLectures(lectures) {
  const container = document.getElementById('main-content');
  let html = '';
  if (lectures.length === 0) {
    container.innerHTML = `<p class="text-center text-gray-500 py-20">No lectures found.</p>`;
    return;
  }
  lectures.forEach(lec => {
    const imageUrl = lec.imageUrl || "https://via.placeholder.com/80x80/1f2937/ffffff?text=Instructor";
    const isCompleted = lec.completed === true;
    html += `
      <div class="lecture-card bg-white rounded-3xl p-5 flex gap-4 border border-gray-100 mb-5">
        <img src="${imageUrl}" class="w-16 h-16 rounded-2xl object-cover flex-shrink-0">
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <div>
              <span class="text-xs text-gray-500">${lec.date || 'N/A'} • ${lec.duration || '45m'}</span>
              <h3 class="font-semibold text-base mt-1 line-clamp-2">${lec.title}</h3>
            </div>
            <button onclick="markLectureComplete('${lec._id}')"
                    class="w-9 h-9 flex items-center justify-center rounded-full border-2 flex-shrink-0 ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 hover:border-green-500 hover:bg-green-50'}">
              ${isCompleted ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-check text-gray-400"></i>'}
            </button>
          </div>
          <div class="flex gap-3 mt-5">
            <button onclick="playVideo('${lec.youtubeId || ''}')" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-2xl text-sm font-medium flex items-center justify-center gap-2">
              <i class="fa-solid fa-play"></i> Watch
            </button>
            <button onclick="showNotesModal('${lec.pdfLink || ''}', '${lec.dppLink || ''}')" class="flex-1 border-2 border-gray-300 hover:border-gray-400 hover:bg-gray-50 py-2.5 rounded-2xl text-sm font-medium flex items-center justify-center gap-2">
              <i class="fa-solid fa-book-open"></i> Notes & More
            </button>
          </div>
        </div>
      </div>`;
  });
  container.innerHTML = html;
}

// Notes & DPP Modal
function showNotesModal(pdfLink, dppLink) {
  currentPdfLink = pdfLink;
  currentDppLink = dppLink;
  if (!pdfLink && !dppLink) {
    alert("Notes and DPP will be added soon for this lecture!");
    return;
  }
  document.getElementById('notes-modal').classList.remove('hidden');
}

function hideNotesModal() {
  document.getElementById('notes-modal').classList.add('hidden');
}

function openPdf() {
  if (currentPdfLink) window.open(currentPdfLink, '_blank');
  hideNotesModal();
}

function openDpp() {
  if (currentDppLink) window.open(currentDppLink, '_blank');
  hideNotesModal();
}

function applyFilters() {
  const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
  const filterType = document.getElementById('filter-select').value;
  let filtered = allLectures.filter(lec => {
    const matchesSearch = !searchTerm || lec.title.toLowerCase().includes(searchTerm);
    let matchesFilter = true;
    if (filterType === 'completed') matchesFilter = lec.completed === true;
    if (filterType === 'pending') matchesFilter = lec.completed !== true;
    return matchesSearch && matchesFilter;
  });
  renderLectures(filtered);
}

function playVideo(videoId) {
  if (!videoId) return alert("No YouTube video ID added yet.");
  window.open(`https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`, '_blank');
}

async function markLectureComplete(lectureId) {
  try {
    const res = await fetch(`/api/lectures/${lectureId}/complete`, {
      method: 'POST',
      credentials: 'include'
    });
    const data = await res.json();
    if (data.success) loadData();
    else alert(data.msg || "Failed to mark completed");
  } catch (err) {
    alert("Please login first");
  }
}

function selectChapter(chapterId) {
  currentChapterId = chapterId;
  document.getElementById('search-input').value = '';
  document.getElementById('filter-select').value = 'all';
  loadData();
  if (window.innerWidth < 768) toggleSidebar();
}

// ====================== MANAGE MODAL ======================
function showManageModal() {
  manageMode = 1;
  document.getElementById('manage-modal').classList.remove('hidden');
  updateManageUI();
}

function hideManageModal() {
  document.getElementById('manage-modal').classList.add('hidden');
}

function setManageMode(mode) {
  manageMode = mode;
  updateManageUI();
}

function updateManageUI() {
  for (let i = 1; i <= 5; i++) {
    const btn = document.getElementById(`btn${i}`);
    if (btn) btn.classList.remove('manage-btn-active');
  }
  const activeBtn = document.getElementById(`btn${manageMode}`);
  if (activeBtn) activeBtn.classList.add('manage-btn-active');

  for (let i = 1; i <= 5; i++) {
    const form = document.getElementById(`form${i}`);
    if (form) form.classList.toggle('hidden', i !== manageMode);
  }

  if (manageMode === 2) populateLectureChapterSelect();
  if (manageMode === 3) populateDeleteChapterSelect();
  if (manageMode === 4) populateDeleteLectureChapterSelect();
  if (manageMode === 5) populateUpdateChapterSelect();
}

// Populate functions (kept as you had)
async function populateLectureChapterSelect() {
  const select = document.getElementById('lecture-chapter-select');
  select.innerHTML = '<option value="">Select Chapter</option>';
  try {
    const res = await fetch(`/api/chapters?subjectId=${subjectId}`, { credentials: 'include' });
    const chapters = await res.json();
    chapters.forEach(ch => {
      const opt = document.createElement('option');
      opt.value = ch._id;
      opt.textContent = ch.title;
      select.appendChild(opt);
    });
  } catch (e) {}
}

  const select = document.getElementById('update-lecture-chapter');

    const res = await fetch(`/api/chapters?subjectId=${subjectId}`, { credentials: 'include' });
    const chapters = await res.json();

  select.innerHTML = '<option value="">Select Lecture to Update</option>';
  if (!chapterId) return;
  try {
    const res = await fetch(`/api/lectures?chapterId=${chapterId}`, { credentials: 'include' });
    const lectures = await res.json();
    lectures.forEach(lec => {
      const opt = document.createElement('option');
      opt.value = lec._id;
      opt.textContent = lec.title;

// FIXED: Load existing data when selecting a lecture for update
async function loadLectureForUpdate() {
  const lectureId = document.getElementById('update-lecture-select').value;
  if (!lectureId) return;

  try {
    const res = await fetch(`/api/lectures/${lectureId}`, { credentials: 'include' });
    if (!res.ok) throw new Error('Lecture not found');

    const lec = await res.json();

    document.getElementById('update-title').value = lec.title || '';
    document.getElementById('update-youtube').value = lec.youtubeId || '';
    document.getElementById('update-image').value = lec.imageUrl || '';
    document.getElementById('update-pdf').value = lec.pdfLink || '';
    document.getElementById('update-dpp').value = lec.dppLink || '';

    console.log("✅ Loaded existing data for lecture:", lec.title);
  } catch (e) {
    console.error("Failed to load lecture data for update:", e);
    alert("Could not load lecture details. Please try again.");
  }
}

// Admin Login
async function adminLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPass').value.trim();
  if (!email || !password) return alert("Please enter email and password");

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
      credentials: 'include'
    });
    const data = await res.json();
    if (data.success) {
      hideLoginModal();
      isAdmin = true;
      document.getElementById('manage-btn').classList.remove('hidden');
      alert('✅ Admin logged in successfully!');
    } else {
      alert(data.msg || 'Invalid credentials');
    }
  } catch (e) {
    alert('Cannot connect to server');
  }
}

function hideLoginModal() {
  document.getElementById('loginModal').classList.add('hidden');
}

// Execute Manage Action
async function executeManageAction() {
  if (!isAdmin) {
    alert("Please login as Admin first");
    hideManageModal();
    return;
  }

  try {
    if (manageMode === 1) { // Add Chapter
      const title = document.getElementById('chapter-title').value.trim();
      if (!title) return alert("Chapter title is required");
      await fetch('/api/chapters', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subjectId, title, order: Date.now() }),
        credentials: 'include'
      });
    }
    else if (manageMode === 2) { // Add Lecture
      const title = document.getElementById('lecture-title').value.trim();
      const chapterId = document.getElementById('lecture-chapter-select').value;
      if (!title || !chapterId) return alert("Title and Chapter are required");
      const newLecture = {
        subjectId,
        chapterId,
        title,
        date: document.getElementById('lecture-date').value || new Date().toLocaleDateString('en-GB'),
        duration: document.getElementById('lecture-duration').value || "45m",
        youtubeId: document.getElementById('lecture-youtube').value.trim(),
        imageUrl: document.getElementById('lecture-image').value.trim(),
        pdfLink: document.getElementById('lecture-pdf').value.trim(),
        dppLink: document.getElementById('lecture-dpp').value.trim()
      };
      await fetch('/api/lectures', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newLecture),
        credentials: 'include'
      });
    }
    else if (manageMode === 3) { // Delete Chapter
      const chapterId = document.getElementById('delete-chapter-select').value;
      if (!chapterId || !confirm("Delete this chapter and all its lectures?")) return;
      await fetch(`/api/chapters/${chapterId}`, { method: 'DELETE', credentials: 'include' });
    }
    else if (manageMode === 4) { // Delete Lecture
      const lectureId = document.getElementById('delete-lecture-select').value;
      if (!lectureId || !confirm("Delete this lecture?")) return;
      await fetch(`/api/lectures/${lectureId}`, { method: 'DELETE', credentials: 'include' });
    }
    else if (manageMode === 5) { // Update Lecture
      const lectureId = document.getElementById('update-lecture-select').value;
      if (!lectureId) return alert("Please select a lecture to update");

      const updateData = {
        title: document.getElementById('update-title').value.trim(),
        youtubeId: document.getElementById('update-youtube').value.trim(),
        imageUrl: document.getElementById('update-image').value.trim(),
        pdfLink: document.getElementById('update-pdf').value.trim(),
        dppLink: document.getElementById('update-dpp').value.trim()
      };

      await fetch(`/api/lectures/${lectureId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updateData),
        credentials: 'include'
      });
    }

    hideManageModal();
    loadData(); // Refresh the page
    alert("Action completed successfully!");
  } catch (err) {
    console.error(err);
    alert("Action failed. Please check console (F12) for details.");
  }
}

// Initialize
window.onload = async () => {
  await checkAuth();
  await loadData();
};
</script>
</body>
</html>
